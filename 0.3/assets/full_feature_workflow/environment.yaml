---
channels:
  - 'conda-forge'
  - 'defaults'
  - 'r'
  - 'dnachun'
dependencies:
  - 'python==3.13'
  - 'pip'
  - pip:
      - 'flepimop2'
      - 'flepimop2-op-engine'
      - 'flepimop2-op-system'
      - 'git+https://git@github.com/ACCIDDA/flepimop2-ipynbrender.git@main'
  - 'scipy'
  - 'plotnine'
  - 'matplotlib'
  - 'pandas'
  - 'r-base>=4.3'
  - 'r-data.table>=1.17'
  - 'r-ggplot2>=3.4'
  - 'r-yaml>=2.3'
