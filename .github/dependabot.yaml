---
version: 2
updates:
  - package-ecosystem: 'uv'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 14
    groups:
      patch:
        patterns:
          - '*'
        update-types:
          - 'patch'
      minor:
        patterns:
          - '*'
        update-types:
          - 'minor'
      major:
        patterns:
          - '*'
        update-types:
          - 'major'
    commit-message:
      prefix: 'uv'
      include: 'scope'
    labels:
      - 'dependencies'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 14
    groups:
      patch:
        patterns:
          - '*'
        update-types:
          - 'patch'
      minor:
        patterns:
          - '*'
        update-types:
          - 'minor'
      major:
        patterns:
          - '*'
        update-types:
          - 'major'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'ci/cd'
