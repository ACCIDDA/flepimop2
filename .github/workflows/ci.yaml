---
name: 'ci'

'on':
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: 'read'

jobs:
  changelog:
    name: 'changelog'
    if:
      ${{ github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'checkout repository'
        uses: 'actions/checkout@v7.0.0'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 'setup just and uv'
        uses: './.github/actions/setup-just-and-uv'
        with:
          enable-cache: false
      - name: 'check changelog updated'
        run: 'just changelog'
  docs:
    name: 'docs'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'checkout repository'
        uses: 'actions/checkout@v7.0.0'
        with:
          persist-credentials: false
      - name: 'setup just and uv'
        uses: './.github/actions/setup-just-and-uv'
        with:
          python-version: '3.14'
      - name: 'build documentation'
        run: 'just docs'
        env:
          UV_LOCKED: 'true'
          UV_PYTHON_VERSION: '3.14'
  quality:
    name: 'quality'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'checkout repository'
        uses: 'actions/checkout@v7.0.0'
        with:
          persist-credentials: false
      - name: 'setup just and uv'
        uses: './.github/actions/setup-just-and-uv'
        with:
          python-version: '3.14'
      - name: 'run quality checks'
        run: 'just quality'
        env:
          UV_LOCKED: 'true'
          UV_PYTHON_VERSION: '3.14'
  package:
    name: 'package'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'checkout repository'
        uses: 'actions/checkout@v7.0.0'
        with:
          persist-credentials: false
      - name: 'setup just and uv'
        uses: './.github/actions/setup-just-and-uv'
        with:
          python-version: '3.14'
      - name: 'sync dev environment'
        run: 'uv sync --locked --python 3.14 --group dev'
      - name: 'check package artifacts'
        run: 'just build-check'
        env:
          UV_LOCKED: 'true'
          UV_PYTHON_VERSION: '3.14'
  tests:
    name: 'tests (${{ matrix.python-version }}, ${{ matrix.dependency-set }})'
    needs:
      - 'docs'
      - 'package'
      - 'quality'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        dependency-set:
          - 'locked'
          - 'lowest-direct'
    steps:
      - name: 'checkout repository'
        uses: 'actions/checkout@v7.0.0'
        with:
          persist-credentials: false
      - name: 'setup just and uv with python ${{ matrix.python-version }}'
        uses: './.github/actions/setup-just-and-uv'
        with:
          python-version: '${{ matrix.python-version }}'
      - name: 'run locked tests'
        if: ${{ matrix.dependency-set == 'locked' }}
        run: 'just ci-pytest'
        env:
          UV_LOCKED: 'true'
          UV_PYTHON_VERSION: '${{ matrix.python-version }}'
      - name: 'run minimum-version tests'
        if: ${{ matrix.dependency-set == 'lowest-direct' }}
        run: 'just ci-pytest-lowest-direct'
        env:
          UV_PYTHON_VERSION: '${{ matrix.python-version }}'
