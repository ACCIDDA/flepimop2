---
name: 'example-provider'
axes:
  age:
    kind: 'continuous'
    domain: [0.0, 90.0]
    size: 3
system:
  - module: 'sir'
    state_change: 'flow'
engine:
  - module: 'euler'
    state_change: 'flow'
backend:
  - module: 'csv'
simulate:
  demo:
    times: '0.0:0.1:10'
parameters:
  s0:
    module: 'fixed'
    value: [999, 899, 799]
    shape: ['age']
  i0:
    module: 'fixed'
    value: [1, 1, 1]
    shape: ['age']
  r0:
    module: 'fixed'
    value: [0, 0, 0]
    shape: ['age']
  gamma:
    module: 'fixed'
    value: 0.1
  beta:
    module: 'linear'
    slope: 0.001
