---
name: Base_Sample_Model

system:
  - module: wrapper
    state_change: flow
    script: model_input/plugins/SIR.py
    model_state:
      parameter_names: [s0, i0, r0]
      labels: [S, I, R]

engine:
  - module: wrapper
    state_change: flow
    script: model_input/plugins/solve_ivp.py

backend:
  - module: csv

simulate:
  quick_start:
    system: default
    engine: default
    backend: default
    times: "0.0:0.1:10"

parameter:
  beta: 0.3
  gamma: 0.1
  s0: 999
  i0: 1
  r0: 0
